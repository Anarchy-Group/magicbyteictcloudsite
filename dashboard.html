<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MagicByte ICT Cloud Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(
        135deg,
        #dbeafe,
        #f8fafc
      );
    }

    .glass {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(148,163,184,0.2);
    }
  </style>
</head>

<body class="p-6 text-slate-800">

  <div class="max-w-7xl mx-auto">

    <!-- HEADER -->

    <div class="glass rounded-3xl p-6 shadow-xl mb-6 flex items-center justify-between">

      <div>
        <h1 class="text-3xl font-bold">
          MagicByte ICT Cloud
        </h1>

        <p class="text-slate-500 mt-1">
          Secure business dashboard
        </p>
      </div>

      <button
        id="logoutBtn"
        class="bg-red-500 hover:bg-red-400 text-white px-5 py-3 rounded-xl font-semibold"
      >
        Logout
      </button>

    </div>

    <!-- BUSINESS INFO -->

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">

      <div class="glass rounded-3xl p-6 shadow-xl">
        <h2 class="text-sm text-slate-500 mb-2">
          Logged In As
        </h2>

        <div
          id="userEmail"
          class="text-xl font-bold break-all"
        >
          Loading...
        </div>
      </div>

      <div class="glass rounded-3xl p-6 shadow-xl">
        <h2 class="text-sm text-slate-500 mb-2">
          Session Status
        </h2>

        <div class="text-xl font-bold text-green-600">
          Active
        </div>
      </div>

      <div class="glass rounded-3xl p-6 shadow-xl">
        <h2 class="text-sm text-slate-500 mb-2">
          Dashboard Token
        </h2>

        <div
          id="tokenDisplay"
          class="text-sm font-mono break-all text-slate-700"
        >
          Loading...
        </div>
      </div>

    </div>

    <!-- MAIN PANELS -->

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

      <div class="glass rounded-3xl p-6 shadow-xl">

        <h2 class="text-2xl font-bold mb-4">
          Business Overview
        </h2>

        <div class="space-y-4">

          <div class="flex justify-between">
            <span class="text-slate-500">Cloud Status</span>
            <span class="font-semibold text-green-600">Operational</span>
          </div>

          <div class="flex justify-between">
            <span class="text-slate-500">Subscription</span>
            <span class="font-semibold">Business Pro</span>
          </div>

          <div class="flex justify-between">
            <span class="text-slate-500">Storage Usage</span>
            <span class="font-semibold">128 GB</span>
          </div>

          <div class="flex justify-between">
            <span class="text-slate-500">Connected Devices</span>
            <span class="font-semibold">12</span>
          </div>

        </div>

      </div>

      <div class="glass rounded-3xl p-6 shadow-xl">

        <h2 class="text-2xl font-bold mb-4">
          Quick Actions
        </h2>

        <div class="grid grid-cols-1 gap-4">

          <button class="bg-blue-600 hover:bg-blue-500 text-white rounded-xl py-4 font-semibold transition">
            Open Cloud Console
          </button>

          <button class="bg-slate-200 hover:bg-slate-300 rounded-xl py-4 font-semibold transition">
            Manage Employees
          </button>

          <button class="bg-slate-200 hover:bg-slate-300 rounded-xl py-4 font-semibold transition">
            Billing Settings
          </button>

        </div>

      </div>

    </div>

  </div>

  <script type="module">

    import { createClient }
    from "https://esm.sh/@supabase/supabase-js@2"

    // ============================================
    // SUPABASE CONFIG
    // ============================================

    const SUPABASE_URL = "https://jihpgbsghatuwwkacsur.supabase.co"

    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppaHBnYnNnaGF0dXd3a2Fjc3VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMzkxNzcsImV4cCI6MjA5MzcxNTE3N30.qH7iso7t2zoOLi0C68DiUKZecyIDhlxVcJAcNhYLHTk"

    const supabase = createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    )

    // ============================================
    // SECURITY CHECK
    // ============================================

    async function secureDashboard() {

      const {
        data: { session }
      } = await supabase.auth.getSession()

      // NO SESSION = REDIRECT
      if (!session) {
        window.location.href = "index.html"
        return
      }

      // USER TOKEN
      const token = session.access_token

      // DISPLAY USER INFO
      document.getElementById("userEmail")
        .textContent = session.user.email

      // DISPLAY SHORTENED TOKEN
      document.getElementById("tokenDisplay")
        .textContent = token.substring(0, 48) + "..."

      // OPTIONAL EXTRA SECURITY
      // TOKEN VALIDATION

      const { data, error } =
        await supabase.auth.getUser(token)

      if (error || !data.user) {
        await supabase.auth.signOut()
        window.location.href = "index.html"
      }
    }

    secureDashboard()

    // ============================================
    // LOGOUT
    // ============================================

    document.getElementById("logoutBtn")
      .addEventListener("click", async () => {

        await supabase.auth.signOut()

        window.location.href = "index.html"
      })

    // ============================================
    // AUTO SESSION MONITOR
    // ============================================

    supabase.auth.onAuthStateChange((event, session) => {

      if (!session) {
        window.location.href = "index.html"
      }
    })

  </script>

</body>
</html>
