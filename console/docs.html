<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>MagicByte Docs</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Quill Editor -->
  <link
    href="https://cdn.quilljs.com/1.3.6/quill.snow.css"
    rel="stylesheet"
  />

  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

  <style>

    body {
      background: #f1f5f9;
    }

    #editor {
      height: 700px;
      background: white;
    }

    .ql-editor {
      font-size: 18px;
      line-height: 1.8;
      padding: 80px;
    }

  </style>

</head>

<body class="p-6">

  <div class="max-w-7xl mx-auto">

    <!-- TOP BAR -->

    <div class="bg-white rounded-3xl shadow-xl p-6 mb-6 flex items-center justify-between">

      <div>

        <h1 class="text-3xl font-bold">
          MagicByte Docs
        </h1>

        <p class="text-slate-500 mt-1">
          Professional cloud workspace
        </p>

      </div>

      <div class="flex gap-3">

        <button
          id="saveBtn"
          class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-3 rounded-xl font-semibold"
        >
          Save
        </button>

        <button
          id="logoutBtn"
          class="bg-red-500 hover:bg-red-400 text-white px-5 py-3 rounded-xl font-semibold"
        >
          Logout
        </button>

      </div>

    </div>

    <!-- EDITOR -->

    <div class="bg-white rounded-3xl shadow-xl overflow-hidden">

      <!-- TOOLBAR -->

      <div id="toolbar">

        <span class="ql-formats">
          <select class="ql-font"></select>
          <select class="ql-size"></select>
        </span>

        <span class="ql-formats">
          <button class="ql-bold"></button>
          <button class="ql-italic"></button>
          <button class="ql-underline"></button>
        </span>

        <span class="ql-formats">
          <button class="ql-header" value="1"></button>
          <button class="ql-header" value="2"></button>
        </span>

        <span class="ql-formats">
          <button class="ql-list" value="ordered"></button>
          <button class="ql-list" value="bullet"></button>
        </span>

        <span class="ql-formats">
          <button class="ql-image"></button>
        </span>

        <span class="ql-formats">
          <button class="ql-clean"></button>
        </span>

      </div>

      <!-- DOCUMENT -->

      <div id="editor"></div>

    </div>

  </div>

  <script>

    // ============================================
    // SUPABASE
    // ============================================

    const SUPABASE_URL =
      "https://jihpgbsghatuwwkacsur.supabase.co"

    const SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppaHBnYnNnaGF0dXd3a2Fjc3VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMzkxNzcsImV4cCI6MjA5MzcxNTE3N30.qH7iso7t2zoOLi0C68DiUKZecyIDhlxVcJAcNhYLHTk"

    const supabase =
      window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY
      )

    // ============================================
    // QUILL EDITOR
    // ============================================

    const quill = new Quill(
      "#editor",
      {
        theme: "snow",

        modules: {
          toolbar: "#toolbar"
        }
      }
    )

    quill.root.innerHTML = `
      <h1>Welcome to MagicByte Docs</h1>

      <p>
        Start writing here...
      </p>
    `

    // ============================================
    // AUTH PROTECTION
    // ============================================

    async function securePage() {

      const {
        data: { session }
      } = await supabase.auth.getSession()

      if (!session) {

        window.location.href =
          "index.html"

        return
      }

      loadDocument(session.user.id)
    }

    securePage()

    // ============================================
    // SAVE DOCUMENT
    // ============================================

    async function saveDocument() {

      const {
        data: { session }
      } = await supabase.auth.getSession()

      const content =
        quill.root.innerHTML

      const { error } =
        await supabase
          .from("documents")
          .insert({
            user_id: session.user.id,
            title: "Untitled Document",
            content: content
          })

      if (error) {

        console.error(error)
        alert(error.message)
        return
      }

      console.log("Saved!")
    }

    document
      .getElementById("saveBtn")
      .addEventListener(
        "click",
        saveDocument
      )

    // ============================================
    // LOAD DOCUMENT
    // ============================================

    async function loadDocument(userId) {

      const { data } =
        await supabase
          .from("documents")
          .select("*")
          .eq("user_id", userId)
          .limit(1)

      if (
        data &&
        data.length > 0
      ) {

        quill.root.innerHTML =
          data[0].content
      }
    }

    // ============================================
    // AUTOSAVE
    // ============================================

    setInterval(() => {

      saveDocument()

    }, 30000)

    // ============================================
    // LOGOUT
    // ============================================

    async function logout() {

      await supabase.auth.signOut()

      window.location.href =
        "index.html"
    }

    document
      .getElementById("logoutBtn")
      .addEventListener(
        "click",
        logout
      )

  </script>

</body>
</html>
