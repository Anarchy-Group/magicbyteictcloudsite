<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>MagicByte Docs</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- SUPABASE -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body {
  background: #f1f5f9;
  font-family: Arial, sans-serif;
  margin: 0;
}

.topbar {

  background: white;

  padding: 20px 30px;

  border-bottom: 1px solid #e2e8f0;

  display: flex;

  align-items: center;

  justify-content: space-between;

  position: sticky;

  top: 0;

  z-index: 100;
}

.toolbar {

  background: white;

  border-bottom: 1px solid #e2e8f0;

  padding: 10px;

  display: flex;

  align-items: center;

  gap: 8px;

  flex-wrap: wrap;

  position: sticky;

  top: 81px;

  z-index: 99;
}

.toolbar-btn {

  min-width: 38px;

  height: 38px;

  border-radius: 10px;

  border: 1px solid #e2e8f0;

  background: white;

  transition: 0.2s;

  display: flex;

  align-items: center;

  justify-content: center;

  cursor: pointer;

  font-size: 15px;
}

.toolbar-btn:hover {

  background: #f1f5f9;
}

.toolbar-select {

  height: 38px;

  border-radius: 10px;

  border: 1px solid #e2e8f0;

  padding: 0 10px;

  background: white;
}

.toolbar-color {

  width: 38px;

  height: 38px;

  border: none;

  background: none;

  cursor: pointer;
}

.divider {

  width: 1px;

  height: 24px;

  background: #e2e8f0;

  margin: 0 4px;
}

.document-wrapper {

  max-width: 1100px;

  margin: 40px auto;
}

.document-page {

  background: white;

  min-height: 1200px;

  box-shadow:
    0 10px 40px rgba(0,0,0,0.08);

  border-radius: 20px;

  overflow: hidden;
}

#editor {

  min-height: 1200px;

  padding: 80px;

  outline: none;

  font-size: 18px;

  line-height: 1.8;
}

#editor img {

  max-width: 100%;

  border-radius: 12px;

  margin: 20px 0;
}

@media print {

  .topbar,
  .toolbar {

    display: none;
  }

  body {

    background: white;
  }

  .document-page {

    box-shadow: none;
  }

  #editor {

    padding: 0;
  }
}

</style>

</head>

<body>

<!-- TOPBAR -->

<div class="topbar">

  <div>

    <h1 class="text-3xl font-bold">
      MagicByte Docs
    </h1>

    <p class="text-slate-500 mt-1">
      Professional cloud workspace
    </p>

  </div>

  <div class="flex gap-3">

    <button
      id="saveBtn"
      class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-3 rounded-xl font-semibold"
    >
      Save
    </button>

    <button
      id="openBtn"
      class="bg-slate-700 hover:bg-slate-600 text-white px-5 py-3 rounded-xl font-semibold"
    >
      Open
    </button>

    <button
      onclick="window.print()"
      class="bg-slate-500 hover:bg-slate-400 text-white px-5 py-3 rounded-xl font-semibold"
    >
      Print
    </button>

    <button
      onclick="logout()"
      class="bg-red-500 hover:bg-red-400 text-white px-5 py-3 rounded-xl font-semibold"
    >
      Logout
    </button>

  </div>

</div>

<!-- TOOLBAR -->

<div class="toolbar">

  <!-- FONT -->

  <select
    class="toolbar-select"
    onchange="changeFont(this.value)"
  >

    <option value="Arial">
      Arial
    </option>

    <option value="Verdana">
      Verdana
    </option>

    <option value="Tahoma">
      Tahoma
    </option>

    <option value="Georgia">
      Georgia
    </option>

    <option value="Courier New">
      Courier
    </option>

  </select>

  <div class="divider"></div>

  <!-- TEXT STYLE -->

  <button
    class="toolbar-btn font-bold"
    onclick="document.execCommand('bold')"
  >
    B
  </button>

  <button
    class="toolbar-btn italic"
    onclick="document.execCommand('italic')"
  >
    I
  </button>

  <button
    class="toolbar-btn underline"
    onclick="document.execCommand('underline')"
  >
    U
  </button>

  <div class="divider"></div>

  <!-- HIGHLIGHT -->

  <input
    type="color"
    class="toolbar-color"
    onchange="highlightText(this.value)"
  >

  <div class="divider"></div>

  <!-- ALIGN -->

  <button
    class="toolbar-btn"
    onclick="document.execCommand('justifyLeft')"
  >
    ⬅
  </button>

  <button
    class="toolbar-btn"
    onclick="document.execCommand('justifyCenter')"
  >
    ☰
  </button>

  <button
    class="toolbar-btn"
    onclick="document.execCommand('justifyRight')"
  >
    ➡
  </button>

  <div class="divider"></div>

  <!-- LISTS -->

  <button
    class="toolbar-btn"
    onclick="document.execCommand('insertUnorderedList')"
  >
    •
  </button>

  <button
    class="toolbar-btn"
    onclick="document.execCommand('insertOrderedList')"
  >
    1.
  </button>

  <div class="divider"></div>

  <!-- IMAGE -->

  <button
    class="toolbar-btn"
    onclick="insertImage()"
  >
    🖼️
  </button>

</div>

<!-- DOCUMENT -->

<div class="document-wrapper">

  <div class="document-page">

    <div
      id="editor"
      contenteditable="true"
      spellcheck="true"
    >

      <h1>
        Welcome to MagicByte Docs
      </h1>

      <p>
        Start writing here...
      </p>

    </div>

  </div>

</div>

<script>

// ============================================
// SUPABASE
// ============================================

const SUPABASE_URL =
  'https://jihpgbsghatuwwkacsur.supabase.co'

const SUPABASE_ANON_KEY =
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppaHBnYnNnaGF0dXd3a2Fjc3VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMzkxNzcsImV4cCI6MjA5MzcxNTE3N30.qH7iso7t2zoOLi0C68DiUKZecyIDhlxVcJAcNhYLHTk'

const supabase =
  window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  )

// ============================================
// AUTH CHECK
// ============================================

async function checkAuth() {

  const {
    data: { session }
  } = await supabase.auth.getSession()

  if (!session) {

    window.location.href =
      'login.html'

    return
  }
}

// ============================================
// LOGOUT
// ============================================

async function logout() {

  await supabase.auth.signOut()

  window.location.href =
    'login.html'
}

// ============================================
// EDITOR
// ============================================

const editor =
  document.getElementById('editor')

// ============================================
// FONT FAMILY
// ============================================

function changeFont(font) {

  document.execCommand(
    'fontName',
    false,
    font
  )
}

// ============================================
// HIGHLIGHT
// ============================================

function highlightText(color) {

  document.execCommand(
    'styleWithCSS',
    false,
    true
  )

  document.execCommand(
    'hiliteColor',
    false,
    color
  )
}

// ============================================
// IMAGE
// ============================================

function insertImage() {

  const url =
    prompt('Enter image URL')

  if (!url) return

  document.execCommand(
    'insertImage',
    false,
    url
  )
}

// ============================================
// SAVE DOCUMENT
// ============================================

document
  .getElementById('saveBtn')
  .addEventListener(
    'click',
    async () => {

      try {

        const documentData = {

          type:
            'MagicByteDocument',

          version: 1,

          created:
            new Date().toISOString(),

          content:
            editor.innerHTML
        }

        const fileHandle =
          await window.showSaveFilePicker({

            suggestedName:
              'document.mbdocx',

            types: [

              {

                description:
                  'MagicByte Document',

                accept: {

                  'application/octet-stream': [
                    '.mbdocx'
                  ]
                }
              }
            ]
          })

        const writable =
          await fileHandle.createWritable()

        await writable.write(

          JSON.stringify(
            documentData,
            null,
            2
          )
        )

        await writable.close()

        alert(
          'Document saved!'
        )

      } catch (err) {

        console.error(err)
      }
    }
  )

// ============================================
// LOAD DOCUMENT
// ============================================

document
  .getElementById('openBtn')
  .addEventListener(
    'click',
    () => {

      const input =
        document.createElement('input')

      input.type = 'file'

      input.accept = '.mbdocx'

      input.onchange = e => {

        const file =
          e.target.files[0]

        if (!file) return

        const reader =
          new FileReader()

        reader.onload =
          event => {

            try {

              const data =
                JSON.parse(
                  event.target.result
                )

              editor.innerHTML =
                data.content || ''

            } catch {

              alert(
                'Invalid .mbdocx file'
              )
            }
          }

        reader.readAsText(file)
      }

      input.click()
    }
  )

// ============================================
// START
// ============================================

checkAuth()

</script>

</body>
</html>
