<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>MagicByte Docs</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link
  href="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.snow.css"
  rel="stylesheet"
/>

<script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>

<style>

body {
  background: #f1f5f9;
}

#editor-container {
  height: 700px;
}

.ql-editor {
  font-size: 18px;
  line-height: 1.8;
  padding: 60px;
}

</style>

</head>

<body class="p-6">

<div class="max-w-7xl mx-auto">

  <!-- TOP -->

  <div class="bg-white rounded-3xl shadow-xl p-6 mb-6 flex items-center justify-between">

    <div>

      <h1 class="text-3xl font-bold">
        MagicByte Docs
      </h1>

      <p class="text-slate-500 mt-1">
        Professional cloud workspace
      </p>

    </div>

    <div class="flex gap-3">

      <button
        id="saveBtn"
        class="bg-blue-600 text-white px-5 py-3 rounded-xl font-semibold"
      >
        Save
      </button>

      <button
        id="logoutBtn"
        class="bg-red-500 text-white px-5 py-3 rounded-xl font-semibold"
      >
        Logout
      </button>

    </div>

  </div>

  <!-- QUILL -->

  <div class="bg-white rounded-3xl shadow-xl overflow-hidden">

    <div id="editor-container"></div>

  </div>

</div>

<script>

const SUPABASE_URL =
  "YOUR_SUPABASE_URL"

const SUPABASE_ANON_KEY =
  "YOUR_SUPABASE_ANON_KEY"

const supabase =
  window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  )

// ============================================
// QUILL
// ============================================

const quill = new Quill(
  '#editor-container',
  {
    theme: 'snow',

    placeholder:
      'Start writing your document...',

    modules: {
      toolbar: [
        [{ header: [1, 2, false] }],

        ['bold', 'italic', 'underline'],

        [
          { list: 'ordered' },
          { list: 'bullet' }
        ],

        ['image'],

        ['clean']
      ]
    }
  }
)

// ============================================
// AUTH
// ============================================

async function securePage() {

  const {
    data: { session }
  } = await supabase.auth.getSession()

  if (!session) {

    window.location.href =
      'index.html'

    return
  }

  loadDocument(session.user.id)
}

securePage()

// ============================================
// SAVE
// ============================================

async function saveDocument() {

  const {
    data: { session }
  } = await supabase.auth.getSession()

  const content =
    quill.root.innerHTML

  const { error } =
    await supabase
      .from('documents')
      .insert({
        user_id: session.user.id,
        title: 'Untitled Document',
        content: content
      })

  if (error) {

    alert(error.message)
    return
  }

  console.log('Saved!')
}

document
  .getElementById('saveBtn')
  .addEventListener(
    'click',
    saveDocument
  )

// ============================================
// LOAD
// ============================================

async function loadDocument(userId) {

  const { data } =
    await supabase
      .from('documents')
      .select('*')
      .eq('user_id', userId)
      .limit(1)

  if (
    data &&
    data.length > 0
  ) {

    quill.root.innerHTML =
      data[0].content
  }
}

// ============================================
// AUTOSAVE
// ============================================

setInterval(() => {

  saveDocument()

}, 30000)

// ============================================
// LOGOUT
// ============================================

async function logout() {

  await supabase.auth.signOut()

  window.location.href =
    'index.html'
}

document
  .getElementById('logoutBtn')
  .addEventListener(
    'click',
    logout
  )

</script>

</body>
</html>
