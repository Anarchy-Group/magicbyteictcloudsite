<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Reset Password</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-slate-100 p-6">

  <div class="bg-white shadow-2xl rounded-3xl p-8 w-full max-w-md">

    <h1 class="text-3xl font-bold text-center mb-2">
      Reset Password
    </h1>

    <p class="text-slate-500 text-center mb-8">
      Enter your new password
    </p>

    <div class="space-y-4">

      <input
        id="password"
        type="password"
        placeholder="New Password"
        class="w-full border border-slate-300 rounded-xl px-4 py-3"
      >

      <button
        id="resetBtn"
        class="w-full bg-blue-600 hover:bg-blue-500 text-white rounded-xl py-3 font-semibold"
      >
        Update Password
      </button>

      <div
        id="status"
        class="text-center text-sm text-slate-500"
      ></div>

    </div>

  </div>

  <script type="module">

    import { createClient }
    from "https://esm.sh/@supabase/supabase-js@2"

    const SUPABASE_URL =
      "https://jihpgbsghatuwwkacsur.supabase.co"

    const SUPABASE_ANON_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImppaHBnYnNnaGF0dXd3a2Fjc3VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMzkxNzcsImV4cCI6MjA5MzcxNTE3N30.qH7iso7t2zoOLi0C68DiUKZecyIDhlxVcJAcNhYLHTk"

    const supabase = createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    )

    const status =
      document.getElementById("status")

    document
      .getElementById("resetBtn")
      .addEventListener("click", resetPassword)

    async function resetPassword() {

      const password =
        document.getElementById("password").value

      if (password.length < 8) {

        status.textContent =
          "Password must be at least 8 characters"

        status.style.color = "red"

        return
      }

      const { error } =
        await supabase.auth.updateUser({
          password: password
        })

      if (error) {

        status.textContent =
          error.message

        status.style.color = "red"

        return
      }

      status.textContent =
        "Password updated successfully!"

      status.style.color =
        "green"

      setTimeout(() => {

        window.location.href =
          "index.html"

      }, 2000)
    }

  </script>

</body>
</html>
